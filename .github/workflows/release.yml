name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    name: Verify tag matches Cargo.toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Check version
        run: |
          CARGO_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Verify holiday snapshot is up to date
        run: |
          make holidays
          if ! git diff --exit-code src/generated/serbian_holidays.json; then
            echo "::error::Holiday snapshot is outdated. Run 'make ver-holidays' and push before tagging."
            exit 1
          fi

  build:
    name: Build (${{ matrix.target }})
    needs: check-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: >
          sudo apt-get update && sudo apt-get install -y
          libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
          libxkbcommon-dev libgtk-3-dev

      - name: Build
        run: cargo build --release --features gui --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="ibkr-porez-${VERSION}-${{ matrix.target }}.tar.gz"
          mkdir staging
          cp target/${{ matrix.target }}/release/ibkr-porez staging/
          cp target/${{ matrix.target }}/release/ibkr-porez-gui staging/
          strip staging/ibkr-porez staging/ibkr-porez-gui
          cp LICENSE.txt staging/
          tar -czf "$ARCHIVE" -C staging .
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="ibkr-porez-${VERSION}-${{ matrix.target }}.zip"
          mkdir staging
          cp target/${{ matrix.target }}/release/ibkr-porez.exe staging/
          cp target/${{ matrix.target }}/release/ibkr-porez-gui.exe staging/
          cp LICENSE.txt staging/
          cd staging && 7z a "../$ARCHIVE" . && cd ..
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  installer-macos:
    name: macOS Installer
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-apple-darwin"

      - name: Create universal PKG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Extract into explicitly named directories
          mkdir -p aarch64 x86_64
          tar -xzf aarch64-apple-darwin/*.tar.gz -C aarch64
          tar -xzf x86_64-apple-darwin/*.tar.gz -C x86_64

          # Create universal binaries (lipo does not preserve +x)
          mkdir -p universal
          lipo -create -output universal/ibkr-porez-gui aarch64/ibkr-porez-gui x86_64/ibkr-porez-gui
          lipo -create -output universal/ibkr-porez \
            aarch64/ibkr-porez x86_64/ibkr-porez
          chmod +x universal/ibkr-porez-gui universal/ibkr-porez

          # Create .app bundle
          APP="staging/IBKR Porez.app/Contents"
          mkdir -p "$APP/MacOS" "$APP/Resources"
          cp universal/ibkr-porez-gui universal/ibkr-porez "$APP/MacOS/"
          cp icon/ibkr_porez.icns "$APP/Resources/AppIcon.icns"
          sed "s/VERSION/$VERSION/g" scripts/Info.plist.template \
            > "$APP/Info.plist"

          # Ad-hoc sign
          codesign --force --deep --sign - \
            "staging/IBKR Porez.app"

          # Postinstall script for CLI symlink
          mkdir -p pkg-scripts
          printf '#!/bin/bash\nmkdir -p /usr/local/bin\nln -sf "/Applications/IBKR Porez.app/Contents/MacOS/ibkr-porez" /usr/local/bin/ibkr-porez\n' \
            > pkg-scripts/postinstall
          chmod +x pkg-scripts/postinstall

          # Generate component plist and disable relocation
          pkgbuild --analyze --root staging component.plist
          /usr/libexec/PlistBuddy -c "Set :0:BundleIsRelocatable false" component.plist

          pkgbuild --root staging \
            --component-plist component.plist \
            --install-location /Applications \
            --identifier engineer.sorokin.ibkr-porez \
            --version "$VERSION" \
            --scripts pkg-scripts \
            component.pkg
          # Distribution XML for branded installer
          cat > distribution.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="1">
              <title>IBKR Porez</title>
              <options customize="never" require-scripts="false"/>
              <choices-outline>
                  <line choice="default"/>
              </choices-outline>
              <choice id="default" title="IBKR Porez">
                  <pkg-ref id="engineer.sorokin.ibkr-porez"/>
              </choice>
              <pkg-ref id="engineer.sorokin.ibkr-porez"
                       version="${VERSION}" onConclusion="none">component.pkg</pkg-ref>
          </installer-gui-script>
          EOF
          INSTALLER="ibkr-porez-${VERSION}-macos-universal.pkg"
          productbuild --distribution distribution.xml \
            --package-path . "$INSTALLER"
          echo "INSTALLER=$INSTALLER" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: ${{ env.INSTALLER }}

  installer-windows:
    name: Windows Installer
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: x86_64-pc-windows-msvc

      - name: Extract binaries
        shell: bash
        run: |
          ARCHIVE=$(ls *.zip)
          mkdir -p staging && cd staging && 7z x "../$ARCHIVE" && cd ..

      - name: Install WiX and UI extension
        shell: pwsh
        run: |
          dotnet tool install --global wix
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          wix extension add WixToolset.UI.wixext/6.0.2

      - name: Build MSI
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          $VERSION = "$env:GITHUB_REF_NAME" -replace '^v',''
          wix build wix/main.wxs `
            -ext WixToolset.UI.wixext `
            -arch x64 `
            -d ProductVersion=$VERSION `
            -o "ibkr-porez-${VERSION}-windows-x86_64.msi"
          "INSTALLER=ibkr-porez-${VERSION}-windows-x86_64.msi" |
            Out-File -Append $env:GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: ${{ env.INSTALLER }}

  release:
    name: Create GitHub Release
    needs: [build, installer-macos, installer-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Generate release body
        run: |
          V=${{ env.VERSION }}
          TAG=${{ github.ref_name }}
          BASE="https://github.com/andgineer/ibkr-porez-rs/releases/download/${TAG}/ibkr-porez-${V}"
          cat > body.md << EOF
          ## Downloads

          ### Installers (GUI + CLI)

          | Platform | File |
          |----------|------|
          | **macOS** (Intel + Apple Silicon) | [.pkg](${BASE}-macos-universal.pkg) |
          | **Windows** x86_64 | [.msi](${BASE}-windows-x86_64.msi) |

          ### Portable binaries

          | Platform | File |
          |----------|------|
          | **macOS** Apple Silicon | [.tar.gz](${BASE}-aarch64-apple-darwin.tar.gz) |
          | **macOS** Intel | [.tar.gz](${BASE}-x86_64-apple-darwin.tar.gz) |
          | **Windows** x86_64 | [.zip](${BASE}-x86_64-pc-windows-msvc.zip) |
          | **Linux** x86_64 | [.tar.gz](${BASE}-x86_64-unknown-linux-gnu.tar.gz) |

          ---
          [Installation instructions](https://andgineer.github.io/ibkr-porez-rs/en/installation.html)
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: body.md
          append_body: true
          files: |
            *.tar.gz
            *.zip
            *.pkg
            *.msi
