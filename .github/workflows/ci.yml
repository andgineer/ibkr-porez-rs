name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  snapshot:
    name: Verify holiday snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify holiday snapshot is up to date
        run: |
          make holidays
          git diff --exit-code src/generated/serbian_holidays.json

  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v5  # required by test_python_compat.rs

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: >
          sudo apt-get update && sudo apt-get install -y
          libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
          libxkbcommon-dev libgtk-3-dev

      - run: cargo fmt --check
      - run: cargo clippy --features gui -- -D warnings
      - run: cargo test --features gui

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v5  # required by test_python_compat.rs
      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install system dependencies
        run: >
          sudo apt-get update && sudo apt-get install -y
          libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
          libxkbcommon-dev libgtk-3-dev

      - name: Run tests with coverage
        run: cargo llvm-cov test --features gui --lcov --output-path coverage.lcov

      - name: PR diff-coverage comment and annotations
        if: github.event_name == 'pull_request'
        uses: scttnlsn/covrs@v0
        with:
          coverage-files: coverage.lcov
          annotate: true

      - name: Extract coverage percentage
        if: github.event_name == 'push'
        id: coverage
        run: |
          cargo llvm-cov report --features gui --json --output-path coverage.json
          PCT=$(jq -r '.data[0].totals.lines.percent' coverage.json | xargs printf '%.1f')
          echo "percentage=$PCT" >> "$GITHUB_OUTPUT"
          if [ "$(echo "$PCT >= 85" | bc -l)" -eq 1 ]; then
            echo "color=#31c854" >> "$GITHUB_OUTPUT"
          elif [ "$(echo "$PCT >= 70" | bc -l)" -eq 1 ]; then
            echo "color=#dfb317" >> "$GITHUB_OUTPUT"
          else
            echo "color=#e05d44" >> "$GITHUB_OUTPUT"
          fi

      - name: Post coverage commit comment
        if: github.event_name == 'push'
        uses: peter-evans/commit-comment@v4
        with:
          body: |
            ## Coverage: ${{ steps.coverage.outputs.percentage }}%

            [Full interactive report](https://htmlpreview.github.io/?https://github.com/${{ github.repository }}/blob/coverage-data/htmlcov/index.html)

      - name: Generate HTML report
        if: github.event_name == 'push'
        run: |
          mkdir -p coverage-data
          cargo llvm-cov report --features gui --html --output-dir coverage-data/htmlcov

      - name: Generate coverage badge
        if: github.event_name == 'push'
        uses: emibcn/badge-action@v2
        with:
          label: coverage
          status: "${{ steps.coverage.outputs.percentage }}%"
          color: ${{ steps.coverage.outputs.color }}
          path: coverage-data/badge.svg

      - name: Publish coverage data
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: coverage-data
          publish_dir: coverage-data
          force_orphan: true
